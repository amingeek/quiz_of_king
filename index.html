<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Game</title>
</head>
<body>
<h1>Quiz Game</h1>
<button id="joinQueue">Join Queue</button>
<div id="question"></div>
<div id="options"></div>

<script>
  const socket = new WebSocket('ws://localhost:8080');
  const joinQueueButton = document.getElementById('joinQueue');
  const questionDiv = document.getElementById('question');
  const optionsDiv = document.getElementById('options');

  socket.onopen = () => {
    console.log('Connected to the server');
  };

  socket.onmessage = (event) => {
    const message = JSON.parse(event.data);
    console.log(message);

    if (message.action === 'start_game') {
      questionDiv.textContent = message.question.question;
      optionsDiv.innerHTML = `
                    <button onclick="answerQuestion(1)">${message.question.option1}</button>
                    <button onclick="answerQuestion(2)">${message.question.option2}</button>
                    <button onclick="answerQuestion(3)">${message.question.option3}</button>
                    <button onclick="answerQuestion(4)">${message.question.option4}</button>
                `;
    } else if (message.action === 'game_result') {
      alert(`Game Over! Scores: Player 1: ${message.scores.player1}, Player 2: ${message.scores.player2}`);
    } else if (message.action === 'next_question') {
      questionDiv.textContent = message.question.question;
      optionsDiv.innerHTML = `
                    <button onclick="answerQuestion(1)">${message.question.option1}</button>
                    <button onclick="answerQuestion(2)">${message.question.option2}</button>
                    <button onclick="answerQuestion(3)">${message.question.option3}</button>
                    <button onclick="answerQuestion(4)">${message.question.option4}</button>
                `;
    }
  };

  joinQueueButton.onclick = () => {
    const playerId = prompt('Enter your player ID');
    socket.send(JSON.stringify({ action: 'join_queue', player_id: playerId }));
  };

  function answerQuestion(answer) {
    const gameId = prompt('Enter your game ID');
    const playerId = prompt('Enter your player ID');
    socket.send(JSON.stringify({ action: 'answer_question', game_id: gameId, player_id: playerId, answer }));
  }
</script>
</body>
</html>
